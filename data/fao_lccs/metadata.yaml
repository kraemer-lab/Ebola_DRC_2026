source: "Copernicus CDS satellite-land-cover (UN FAO LCCS); urban class 190 aggregated to DRC health zones"
citation: "Copernicus Climate Change Service (C3S) (2022). Land cover classification gridded maps from 1992 to present derived from satellite observations. Copernicus Climate Data Store (CDS). Health-zone geometry: DRC_Health_zones.shp (see data/shapefiles/)."
source_url: "https://cds.climate.copernicus.eu/datasets/satellite-land-cover"
retrieved_on: "2026-05-20"
