notes: |
  Point-level refugee/IDP site locations in DRC, extracted from OSM nodes tagged
  with category=refugee_site (88 nodes). Raw file in raw/drc_refugee_sites.csv;
  same data also provided as GeoJSON in raw/drc_refugee_sites.geojson.
  process.py aggregates by point-in-polygon against
  data/shapefiles/DRC_Health_zones.shp to produce a count of sites per zone.
