notes: |
  Pairwise car travel-time (minutes) and road-distance (km) matrices for all 519
  DRC health zones. Built by data/osrm/process.R: zone polygons from
  data/shapefiles/DRC_Health_zones.shp, representative points via st_point_on_surface(),
  routed with osrm::osrmTable() (car profile, public OSRM API). Outputs:
  processed/osrm__travel_time__static.csv, processed/osrm__road_distance__static.csv
  (square OD matrices; zone labels from shapefile field Nom). Coverage: national.
  Known issues: Idjwi largely NA (island not connected in car network).
  See README.md for format, regeneration, and limitations.
