source: "Climate Conflict Vulnerability Index (CCVI) — socio-economic vulnerability indicators aggregated to DRC health zones"
citation: "Climate Conflict Vulnerability Index (2024). climate-conflict.org. Commissioned by German Federal Foreign Office; University of the Bundeswehr Munich and Potsdam Institute for Climate Impact Research (PIK). Health-zone geometry: DRC_Health_zones.shp (see data/shapefiles/). Methodology: https://climate-conflict.org/www/index/methodology"
