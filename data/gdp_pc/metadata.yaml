notes: |
  GDP per capita (PPP, 2017 international USD) for 519 DRC health zones, 2022 snapshot from
  processed/COD-2022-gdp_pc.zs.nc (variable gdp_pc, region = ZSCode). Upstream gridded/
  admin-2 product from Kummu et al. 2025; zonal aggregation via DARTS (planned; not yet
  in-repo). data/gdp_pc/process.R joins to data/shapefiles/DRC_Health_zones.shp,
  exports processed/gdp_pc__gdp_pc__static.csv (nom, gdp_pc), and
  gdp_pc_processed_plot.png. DRC values rely on downscaled estimates (limited reported
  subnational data in Africa). raw/ empty. See README.md for methodology summary.
