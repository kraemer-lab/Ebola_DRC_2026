source: "Kummu et al. (2025) downscaled global GDP per capita (PPP), aggregated to DRC health zones"
citation: "Kummu, M., Kosonen, M. & Masoumzadeh Sayyar, S. (2025). Downscaled gridded global dataset for gross domestic product (GDP) per capita PPP over 1990–2022. Scientific Data 12, 178. https://doi.org/10.1038/s41597-025-04487-x. Data: https://doi.org/10.5281/zenodo.10976733. Health-zone geometry: DRC_Health_zones.shp (see data/shapefiles/)."
