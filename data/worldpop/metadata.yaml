notes: |
  Health-zone population count and density from WorldPop. Upstream rasters aggregated
  via DARTS pipeline (planned; not yet in-repo)—processed/COD-2025-population.zs.nc
  is the current intermediate (region = ZSCode; variables pop_count, area km²,
  pop_density people/km²). data/worldpop/process.R joins to
  data/shapefiles/DRC_Health_zones.shp on ZSCode, exports
  processed/worldpop__pop_count__static.csv and
  processed/worldpop__pop_density__static.csv (nom, counts/density), and maps
  popcount_processed_plot.png / popdensity_processed_plot.png. raw/ is empty.
  Coverage: national, 519 zones. See README.md for regeneration and limitations.
